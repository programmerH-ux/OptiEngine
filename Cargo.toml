[package]
name = "opticore"
version = "0.1.0"
edition = "2024"
authors = ["Your Name <youremail@example.com>"]
description = "High-performance Rust optimization engine with Python bindings"
license = "MIT"
repository = "https://github.com/yourusername/opticore"

[lib]
name = "opticore"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.20", features = ["extension-module"] }
serde = "1.0"
